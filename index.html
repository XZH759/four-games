<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI世界修复计划 · 游戏大厅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="/">
      <img src="/assets/bot-buddy.png" width="36" height="36" alt="" />
      <span>AI世界修复计划</span>
    </a>
    <p class="top-note">每个游戏独立子路径</p>
  </header>

  <section class="home">
    <div class="hero-art">
      <img src="/assets/bot-hero.png" alt="AI 小机伴" />
    </div>
    <div class="hero-copy">
      <p class="brand-xl">AI机伴营</p>
      <h1>选择一个游戏入口</h1>
      <p class="lead">每个玩法对应独立 URL。先完成跳转，游戏逻辑稍后接入。</p>
      <div class="arm-grid">
        <a class="arm-card" href="/plain">
          <span class="arm-tag">臂一 · 对照</span>
          <strong class="arm-name">plain 问卷基线</strong>
          <span class="arm-desc">/plain</span>
        </a>
        <a class="arm-card" href="/stages">
          <span class="arm-tag">臂二 · 闯关</span>
          <strong class="arm-name">stages 基础积分</strong>
          <span class="arm-desc">/stages</span>
        </a>
        <a class="arm-card" href="/collect">
          <span class="arm-tag">臂三 · 养成</span>
          <strong class="arm-name">collect 装扮收集</strong>
          <span class="arm-desc">/collect</span>
        </a>
        <a class="arm-card" href="/race">
          <span class="arm-tag">臂四 · 竞速</span>
          <strong class="arm-name">race 答题数榜</strong>
          <span class="arm-desc">/race</span>
        </a>
        <a class="arm-card arm-card-wide" href="/nuannuan">
          <span class="arm-tag">臂五 · 新游</span>
          <strong class="arm-name">奇迹暖暖</strong>
          <span class="arm-desc">/nuannuan</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
